<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Common Wall Lizard Tracker - Vancouver 🦎</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <style>
        :root {
            --bg: #f4f4f9;
            --text: #333;
            --primary: #2c3e50;
            --accent: #27ae60;
            --list-bg: #fff;
            --border: #ddd;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: var(--bg);
            color: var(--text);
        }

        header {
            background: var(--primary);
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            z-index: 10;
        }

        h1 {
            margin: 0;
            font-size: 1.5rem;
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            padding: 0.5rem;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
        }

        button {
            padding: 0.5rem 1rem;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #219653;
        }

        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        #map {
            flex: 2;
            height: 100%;
            z-index: 1;
        }

        #sidebar {
            flex: 1;
            min-width: 350px;
            max-width: 450px;
            background: var(--list-bg);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .list-header {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            background: #fafafa;
        }

        .list-header h2 {
            margin: 0;
            font-size: 1.2rem;
        }

        #sightings-list {
            flex: 1;
            overflow-y: auto;
            padding: 0;
            margin: 0;
            list-style: none;
        }

        .sighting-item {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            display: flex;
            gap: 10px;
            transition: background 0.2s;
        }

        .sighting-item:hover {
            background: #f0f0f0;
        }

        .sighting-item.active {
            background: #e8f5e9;
            border-left: 4px solid var(--accent);
        }

        .sighting-thumb {
            width: 30vh;
            height: 30vw;
            min-width: 0;
            max-height: 30vh;
            max-width: 30vw;
            object-fit: contain;
            border-radius: 4px;
            background: #eee;
        }

        .sighting-details {
            flex: 1;
        }

        .sighting-date {
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        .sighting-loc {
            font-size: 0.8rem;
            color: #666;
        }

        .popup-content img {
            width: 30vh;
            height: 30vw;
            min-width: 0;
            max-height: 30vh;
            max-width: 30vw;
            object-fit: contain;
            background: #fff;
            border-radius: 4px;
            display: block;
            margin: 10px 0;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255,255,255,0.9);
            padding: 1rem 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            z-index: 1000;
            display: none;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <header>
        <h1 id="app-title">Common Wall Lizard Tracker <span id="last-update" style="font-size: 0.8rem; font-weight: normal; opacity: 0.8;">(Last Update: Sun Apr 26 01:04:15 2026)</span></h1>
        <div class="controls">
            <input type="text" id="postal-input" placeholder="Enter Postal Code (e.g. V6B 1A1)" />
            <button id="search-btn">Center Map</button>
        </div>
    </header>
    
    <div class="main-content">
        <div id="map"></div>
        <div id="sidebar">
            <div class="list-header">
                <h2>Recent Sightings (Last 4 Years)</h2>
                <div style="font-size: 0.8rem; color: #666; margin-top: 5px;" id="sighting-count">Loading...</div>
            </div>
            <ul id="sightings-list">
                <!-- Items will be injected here -->
            </ul>
        </div>
    </div>
    
    <div id="loading">Loading Data...</div>
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script>
        // Taxon IDs
        const ITALIAN_WALL_LIZARD = 337045;
        const COMMON_WALL_LIZARD = 55990;
        
        // Switched to Common Wall Lizard as requested
        const TAXON_ID = COMMON_WALL_LIZARD; 
        
        let map;
        let markers = [];
        let allSightings = [];
        let currentLat = 49.2827;
        let currentLng = -123.1207;
        
        // Initialize map
        function initMap() {
            // Default center: Vancouver
            map = L.map('map').setView([currentLat, currentLng], 11);
            
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
            }).addTo(map);
            
            fetchSightings(currentLat, currentLng);
        }

        // Fetch Data from iNaturalist
        async function fetchSightings(lat, lng) {
            showLoading(true);
            try {
                const date4YearsAgo = new Date();
                date4YearsAgo.setFullYear(date4YearsAgo.getFullYear() - 4);
                const d1 = date4YearsAgo.toISOString().split('T')[0];
                
                // Radius of 50km around the selected point
                const url = `https://api.inaturalist.org/v1/observations?taxon_id=${TAXON_ID}&lat=${lat}&lng=${lng}&radius=50&d1=${d1}&order=desc&order_by=created_at&per_page=200`;
                
                const res = await fetch(url);
                const data = await res.json();
                
                allSightings = data.results;
                document.getElementById('sighting-count').innerText = `${allSightings.length} sightings found`;
                
                renderMarkers();
                renderList();
            } catch (error) {
                console.error("Error fetching data:", error);
                document.getElementById('sighting-count').innerText = "Error loading data.";
            } finally {
                showLoading(false);
            }
        }
        
        function renderMarkers() {
            // Clear existing
            markers.forEach(m => map.removeLayer(m));
            markers = [];
            
            allSightings.forEach((sighting, index) => {
                if (!sighting.location) return;
                
                const [lat, lng] = sighting.location.split(',');
                
                let popupHtml = `<div class="popup-content"><strong>Date:</strong> ${sighting.observed_on || 'Unknown'}`;
                if (sighting.photos && sighting.photos.length > 0) {
                    const photoUrl = sighting.photos[0].url;
                    popupHtml += `<br><img src="${photoUrl}" alt="Lizard photo" />`;
                }
                popupHtml += `</div>`;
                
                const marker = L.marker([lat, lng]).bindPopup(popupHtml);
                
                marker.on('click', () => {
                    highlightListItem(index);
                });
                
                marker.addTo(map);
                markers.push(marker);
            });
        }
        
        function renderList() {
            const listEl = document.getElementById('sightings-list');
            listEl.innerHTML = '';
            
            allSightings.forEach((sighting, index) => {
                const li = document.createElement('li');
                li.className = 'sighting-item';
                li.id = `item-${index}`;
                
                let thumbUrl = '';
                if (sighting.photos && sighting.photos.length > 0) {
                    thumbUrl = sighting.photos[0].url;
                }
                
                const dateStr = sighting.observed_on || 'Unknown Date';
                const placeStr = sighting.place_guess || 'Vancouver';
                
                li.innerHTML = `
                    ${thumbUrl ? `<img src="${thumbUrl}" class="sighting-thumb" alt="Thumb"/>` : '<div class="sighting-thumb"></div>'}
                    <div class="sighting-details">
                        <div class="sighting-date">${dateStr}</div>
                        <div class="sighting-loc">${placeStr}</div>
                    </div>
                `;
                
                li.onclick = () => {
                    highlightListItem(index);
                    if (sighting.location) {
                        const [lat, lng] = sighting.location.split(',');
                        map.setView([lat, lng], 15);
                        markers[index].openPopup();
                    }
                };
                
                listEl.appendChild(li);
            });
        }
        
        function highlightListItem(index) {
            document.querySelectorAll('.sighting-item').forEach(el => el.classList.remove('active'));
            const item = document.getElementById(`item-${index}`);
            if (item) {
                item.classList.add('active');
                item.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }
        
        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }
        
        // Handle Postal Code Search
        document.getElementById('search-btn').addEventListener('click', async () => {
            const postal = document.getElementById('postal-input').value.trim();
            if (!postal) return;
            
            showLoading(true);
            try {
                // Remove spaces and format for API
                const formattedPostal = postal.replace(/\s+/g, '');
                const res = await fetch(`https://geocoder.ca/?locate=${formattedPostal}&json=1`);
                const data = await res.json();
                
                if (data.latt && data.longt) {
                    currentLat = data.latt;
                    currentLng = data.longt;
                    map.setView([currentLat, currentLng], 14);
                    fetchSightings(currentLat, currentLng);
                } else {
                    alert("Location not found for that postal code.");
                }
            } catch (error) {
                console.error("Geocoding error:", error);
                alert("Error finding location.");
            } finally {
                showLoading(false);
            }
        });
        
        // Enter key in input
        document.getElementById('postal-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('search-btn').click();
            }
        });

        // Start
        window.onload = initMap;
    </script>
</body>
</html>
